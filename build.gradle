buildscript {
    ext {
        kotlin_version = '1.9.0' // Or the latest stable version
        camerax_version = '1.3.0'
        ml_kit_version = '17.0.0' // Latest compatible version for object detection
        osmdroid_version = '6.1.17'
        retrofit_version = '2.9.0'
        glide_version = '4.16.0'
        mpandroidchart_version = '3.1.0'
        lottie_version = '6.1.0'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0' // Or the latest stable version
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
